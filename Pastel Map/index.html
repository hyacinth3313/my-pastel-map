<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌸 Soft Pastel Map</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* 🌸 YOUR BRIDGERTON FONT SETUP 🌸 */
    @font-face {
      font-family: 'MyCustomFont';
      src: url('Bridgerton-BF67dede44929d1.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blush: #FFF6F9; --water: #CFE8FF; --pink-road: #F8C8DC;
      --sage: #D8F3DC; --muted: #6D6875; --dark: #3d2f3a;
      --accent: #e8a0b8; --white: #ffffff;
    }
    
    html, body { height: 100%; background: var(--blush); font-family: 'Nunito', sans-serif; color: var(--dark); }
    
    header {
      padding: 22px 36px; display: flex; align-items: center; gap: 14px;
      background: var(--white); border-bottom: 1.5px solid #f0dfe7;
      box-shadow: 0 2px 16px rgba(200,130,165,0.08); position: relative; z-index: 1000;
    }
    .header-icon { font-size: 1.8rem; }
    
    .header-text h1 { font-family: 'MyCustomFont', sans-serif; font-size: 1.8rem; letter-spacing: -0.02em; font-weight: normal; }
    .header-text p  { font-size: 0.85rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
    
    .page-body { display: flex; height: calc(100vh - 84px); }
    aside {
      width: 270px; min-width: 250px; background: var(--white);
      border-right: 1.5px solid #f0dfe7; padding: 26px 20px;
      display: flex; flex-direction: column; gap: 22px; overflow-y: auto;
    }
    
    aside h2 { font-family: 'MyCustomFont', sans-serif; font-size: 1.5rem; margin-bottom: 10px; font-weight: normal; }
    .divider { height: 1px; background: #f0dfe7; }
    
    .legend { display: flex; flex-direction: column; gap: 9px; }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    .legend-pin {
      width: 26px; height: 26px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg); flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .legend-pin span { transform: rotate(45deg); font-size: 0.85rem; }
    
    .tip-box {
      background: #fff0f5; border: 1px dashed #e8a0b8; border-radius: 10px;
      padding: 12px; font-size: 0.8rem; color: var(--dark); font-weight: 600;
      text-align: center; line-height: 1.4;
    }

    .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .action-btn {
      width: 100%; padding: 9px; border: none; font-family: 'Nunito', sans-serif;
      font-weight: 700; border-radius: 6px; cursor: pointer; transition: 0.2s;
      color: var(--dark); font-size: 0.85rem;
    }
    .route-btn { background: var(--water); }
    .route-btn:hover { background: #b8deff; }
    .clear-btn { background: #ffe3e3; }
    .clear-btn:hover { background: #ffc9c9; }

    .map-wrapper { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; cursor: crosshair; }
    
    .leaflet-tile-pane { filter: sepia(0.25) hue-rotate(310deg) saturate(1.2) brightness(0.95) contrast(1.05); }
    
    .leaflet-popup-content-wrapper {
      font-family: 'Nunito', sans-serif; border-radius: 14px;
      box-shadow: 0 4px 20px rgba(180,100,140,0.15); border: 1px solid #f0dfe7;
    }
    .leaflet-popup-tip { background: white; }
    
    .popup-inner h3 { font-family: 'MyCustomFont', sans-serif; font-size: 1.4rem; color: var(--dark); margin-bottom: 4px; font-weight: normal; }
    .popup-inner p  { font-size: 0.85rem; color: var(--muted); line-height: 1.5; font-weight: 600; margin-bottom: 10px; }
    
    /* NEW: Styling for the popup routing button */
    .popup-route-btn {
      width: 100%; padding: 6px; background: var(--water); color: var(--dark);
      border: none; border-radius: 6px; font-family: 'Nunito', sans-serif;
      font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8rem;
    }
    .popup-route-btn:hover { background: #b8deff; }

    .leaflet-control-attribution { font-size: 0.65rem; opacity: 0.6; }

    .leaflet-routing-container {
      background-color: var(--white) !important;
      font-family: 'Nunito', sans-serif !important;
      border: 1px solid #f0dfe7 !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(180,100,140,0.15) !important;
      color: var(--muted) !important;
    }
    
    .add-spot-form input, .add-spot-form select {
      width: 100%; padding: 8px; margin-bottom: 10px;
      border: 1px solid #f0dfe7; border-radius: 6px;
      font-family: 'Nunito', sans-serif; font-weight: 600; color: var(--dark);
      background: var(--blush);
    }
    .add-spot-form button {
      width: 100%; padding: 8px; background: var(--accent);
      color: white; border: none; border-radius: 6px;
      font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer;
    }
    .add-spot-form button:hover { background: #d68ca4; }
  </style>
</head>
<body>

  <header>
    <div class="header-icon">🌸</div>
    <div class="header-text">
      <h1>Soft Pastel Map</h1>
      <p>An interactive & aesthetic world explorer</p>
    </div>
  </header>

  <div class="page-body">
    <aside>
      <div class="tip-box">
        💡 <strong>Pro Tip:</strong> Click anywhere on the map to save and categorize a custom favorite place!
      </div>

      <div>
        <h2>📍 Categories</h2>
        <div class="legend">
          <div class="legend-item"><div class="legend-pin" style="background:#e8a0b8"><span>☕</span></div> Café · quiet spots</div>
          <div class="legend-item"><div class="legend-pin" style="background:#a8d8ea"><span>📚</span></div> Library · study zones</div>
          <div class="legend-item"><div class="legend-pin" style="background:#b8e0b0"><span>🌿</span></div> Park · green escapes</div>
          <div class="legend-item"><div class="legend-pin" style="background:#f9c9d4"><span>🎨</span></div> Art · creative spaces</div>
          <div class="legend-item"><div class="legend-pin" style="background:#ffd6a5"><span>⭐</span></div> Custom · your spots</div>
        </div>
        
        <div class="btn-group">
          <button class="action-btn route-btn" id="toggleRouteBtn" onclick="toggleRouting()">🗺️ Show Directions</button>
          <button class="action-btn clear-btn" onclick="clearCustomMarkers()">🗑️ Clear My Saved Spots</button>
        </div>
      </div>
    </aside>

    <div class="map-wrapper">
      <div id="map"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      const map = L.map('map').setView([12.9716, 77.5946], 13);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
        maxZoom: 19,
      }).addTo(map);

      // The main Search Bar at the top right still works perfectly!
      L.Control.geocoder({
        defaultMarkGeocode: true,
        placeholder: "Search for a cozy place..."
      }).addTo(map);

      // --- FIXED DIRECTIONS SYSTEM ---
      // We removed the broken geocoder text boxes and added default draggable pins
      const routingControl = L.Routing.control({
        waypoints: [
          L.latLng(12.9716, 77.5946), // Default Start
          L.latLng(12.9352, 77.6245)  // Default End
        ],
        routeWhileDragging: true,
        showAlternatives: false,
        addWaypoints: false, // Prevents adding accidental middle-points
        lineOptions: {
          styles: [{color: '#e8a0b8', opacity: 0.9, weight: 6}]
        }
      }).addTo(map);

      routingControl.getContainer().style.display = 'none';

      window.toggleRouting = function() {
        const container = routingControl.getContainer();
        const btn = document.getElementById('toggleRouteBtn');
        
        if (container.style.display === 'none') {
          container.style.display = 'block';
          btn.innerHTML = "🗺️ Hide Directions";
        } else {
          container.style.display = 'none';
          btn.innerHTML = "🗺️ Show Directions";
        }
      };

      // --- NEW FEATURE: Auto-route to a marker ---
      window.routeToThisSpot = function(lat, lng) {
        // Keeps the current Start pin, but snaps the End pin to your clicked marker!
        const currentWaypoints = routingControl.getWaypoints();
        const startPoint = currentWaypoints[0].latLng || L.latLng(12.9716, 77.5946);
        
        routingControl.setWaypoints([
          startPoint,
          L.latLng(lat, lng)
        ]);

        // Automatically open the directions panel so you can see it
        routingControl.getContainer().style.display = 'block';
        document.getElementById('toggleRouteBtn').innerHTML = "🗺️ Hide Directions";
        
        // Close the popup so you can see the route
        map.closePopup();
      };

      const categoryData = {
        'cafe':    { emoji: '☕', color: '#e8a0b8' },
        'library': { emoji: '📚', color: '#a8d8ea' },
        'park':    { emoji: '🌿', color: '#b8e0b0' },
        'art':     { emoji: '🎨', color: '#f9c9d4' },
        'custom':  { emoji: '⭐', color: '#ffd6a5' }
      };

      function makePin(emoji, color) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">
          <defs><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(80,40,60,0.25)"/></filter></defs>
          <path d="M22 2C11.5 2 3 10.5 3 21c0 13 19 31 19 31s19-18 19-31C41 10.5 32.5 2 22 2z"
            fill="${color}" stroke="white" stroke-width="2.5" filter="url(#sh)"/>
          <circle cx="22" cy="21" r="12" fill="white" opacity="0.9"/>
          <text x="22" y="26" text-anchor="middle" font-family="sans-serif" font-size="14">${emoji}</text>
        </svg>`;
        return L.divIcon({ html: svg, iconSize:[44,54], iconAnchor:[22,52], popupAnchor:[0,-50], className:'' });
      }

      const storageKey = 'pastelMapCustomSpots';
      
      function loadSavedMarkers() {
        const saved = JSON.parse(localStorage.getItem(storageKey)) || [];
        saved.forEach(spot => {
          const cat = spot.category || 'custom'; 
          const details = categoryData[cat];
          L.marker([spot.lat, spot.lng], { icon: makePin(details.emoji, details.color) })
            .addTo(map)
            .bindPopup(`
              <div class="popup-inner">
                <h3>${details.emoji} ${spot.name}</h3>
                <p>A custom spot added by you!</p>
                <button class="popup-route-btn" onclick="routeToThisSpot(${spot.lat}, ${spot.lng})">🗺️ Route Here</button>
              </div>
            `);
        });
      }

      function saveMarker(lat, lng, name, category) {
        const saved = JSON.parse(localStorage.getItem(storageKey)) || [];
        saved.push({ lat, lng, name, category });
        localStorage.setItem(storageKey, JSON.stringify(saved));
      }

      window.clearCustomMarkers = function() {
        if(confirm("Are you sure you want to delete all your saved spots?")) {
          localStorage.removeItem(storageKey);
          location.reload(); 
        }
      }

      loadSavedMarkers();

      let tempPopup;

      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        const formHtml = `
          <div class="popup-inner add-spot-form">
            <h3>✨ Add New Spot</h3>
            <input type="text" id="spotNameInput" placeholder="Name this place..." autocomplete="off">
            <select id="spotCategorySelect">
              <option value="cafe">☕ Café</option>
              <option value="library">📚 Library</option>
              <option value="park">🌿 Park</option>
              <option value="art">🎨 Art</option>
              <option value="custom">⭐ Custom</option>
            </select>
            <button onclick="submitNewSpot(${lat}, ${lng})">Save Spot</button>
          </div>
        `;

        tempPopup = L.popup()
          .setLatLng(e.latlng)
          .setContent(formHtml)
          .openOn(map);
          
        setTimeout(() => document.getElementById('spotNameInput').focus(), 100);
      });

      window.submitNewSpot = function(lat, lng) {
        const nameInput = document.getElementById('spotNameInput').value;
        const catInput = document.getElementById('spotCategorySelect').value;

        if (!nameInput.trim()) {
          alert("Please give your spot a name!");
          return;
        }

        const details = categoryData[catInput];

        L.marker([lat, lng], { icon: makePin(details.emoji, details.color) })
          .addTo(map)
          .bindPopup(`
            <div class="popup-inner">
              <h3>${details.emoji} ${nameInput}</h3>
              <p>A custom spot added by you!</p>
              <button class="popup-route-btn" onclick="routeToThisSpot(${lat}, ${lng})">🗺️ Route Here</button>
            </div>
          `)
          .openPopup();

        saveMarker(lat, lng, nameInput, catInput);
        map.closePopup(tempPopup);
      };

      const markers = [
        { lat: 12.9352, lng: 77.6245, emoji: "☕", color: "#e8a0b8", title: "Koramangala Café", desc: "A quiet corner for deep focus sessions" },
        { lat: 12.9750, lng: 77.5900, emoji: "📚", color: "#a8d8ea", title: "State Central Library", desc: "Historic building with reading rooms" },
        { lat: 12.9507, lng: 77.5848, emoji: "🌿", color: "#b8e0b0", title: "Lalbagh Botanical Garden", desc: "A sprawling green escape in the city" },
        { lat: 12.9885, lng: 77.5841, emoji: "🎨", color: "#f9c9d4", title: "NGMA Bengaluru", desc: "Art gallery, workshops & creative community" }
      ];

      markers.forEach(({ lat, lng, emoji, color, title, desc }) => {
        L.marker([lat, lng], { icon: makePin(emoji, color) })
          .addTo(map)
          .bindPopup(`
            <div class="popup-inner">
              <h3>${emoji} ${title}</h3>
              <p>${desc}</p>
              <button class="popup-route-btn" onclick="routeToThisSpot(${lat}, ${lng})">🗺️ Route Here</button>
            </div>
          `);
      });

    });
  </script>

</body>
</html>
